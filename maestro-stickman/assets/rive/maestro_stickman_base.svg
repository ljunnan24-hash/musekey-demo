<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Maestro Stickman Base</title>
  <desc>Simple piano stickman base artwork for the first Rive version.</desc>

  <g id="maestro_stickman">
    <g id="piano">
      <rect id="piano_shadow" x="30" y="129" width="100" height="20" rx="5" fill="#161426" opacity="0.35"/>
      <rect id="piano_body" x="26" y="124" width="108" height="20" rx="5" fill="#292440"/>
      <rect id="piano_top" x="30" y="127" width="100" height="4" rx="2" fill="#4D476E"/>
      <g id="piano_keys" opacity="0.95">
        <rect x="36" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="47" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="58" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="69" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="80" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="91" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="102" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
        <rect x="113" y="134" width="7" height="8" rx="1" fill="#F5F0FF"/>
      </g>
    </g>

    <g id="stickman" stroke="#FF7FA8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <line id="body" x1="80" y1="66" x2="80" y2="104"/>
      <line id="left_leg" x1="80" y1="104" x2="64" y2="130"/>
      <line id="right_leg" x1="80" y1="104" x2="96" y2="130"/>
      <line id="left_arm" x1="80" y1="75" x2="58" y2="105"/>
      <line id="right_arm" x1="80" y1="75" x2="104" y2="105"/>
    </g>

    <circle id="head" cx="80" cy="45" r="29" fill="#FF7FA8"/>
    <g id="face_idle" fill="#2A2440">
      <circle id="left_eye" cx="70" cy="43" r="2.6"/>
      <circle id="right_eye" cx="90" cy="43" r="2.6"/>
      <path id="mouth" d="M72 54C77 58 83 58 88 54" stroke="#2A2440" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g id="hands" fill="#FF7FA8">
      <circle id="left_hand" cx="58" cy="105" r="5"/>
      <circle id="right_hand" cx="104" cy="105" r="5"/>
    </g>
  </g>
</svg>
