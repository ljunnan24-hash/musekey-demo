<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #14121c;
        --pink: #ff8fab;
        --text: #ece8ff;
        --muted: #8b86a8;
        --border: rgba(255, 143, 171, 0.35);
      }
      * { box-sizing: border-box; }
      body {
        width: 280px;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 -apple-system, "PingFang SC", system-ui, sans-serif;
        padding: 16px;
      }
      h1 { margin: 0 0 14px; font-size: 15px; color: var(--pink); }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
      }
      .switch { position: relative; width: 40px; height: 22px; flex: none; }
      .switch input {
        opacity: 0; width: 100%; height: 100%; margin: 0;
        position: absolute; cursor: pointer;
      }
      .switch .track {
        position: absolute; inset: 0; background: #3a3550; border-radius: 999px;
        transition: background 0.15s;
      }
      .switch .knob {
        position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
        background: #fff; border-radius: 50%; transition: transform 0.15s;
      }
      .switch input:checked + .track { background: var(--pink); }
      .switch input:checked + .track + .knob { transform: translateX(18px); }
      input[type="range"] { accent-color: var(--pink); width: 130px; }
      output {
        color: var(--pink); font-variant-numeric: tabular-nums;
        min-width: 36px; text-align: right;
      }
      button {
        width: 100%;
        margin-top: 14px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        font: inherit;
        cursor: pointer;
      }
      button:hover { color: var(--pink); border-color: var(--pink); }
      .muted { color: var(--muted); font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Maestro Stickman</h1>

    <div class="row">
      <span>启用</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="track"></span><span class="knob"></span>
      </label>
    </div>

    <div class="row">
      <span>尺寸</span>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" id="scale" min="0.5" max="2" step="0.05" />
        <output id="scaleOut">100%</output>
      </div>
    </div>

    <button id="openOptions">打开完整设置…</button>
    <script src="popup.js"></script>
  </body>
</html>
