<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KeyJam · 自动挡吉他 · 边弹边唱</title>
<style>
  :root {
    --bg: #14121c; --bg2: #1d1a2b; --fg: #ece8ff; --muted: #8b86a8;
    --accent: #ff8fab; --accent2: #8fd3ff; --field: #221f33;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
    color: var(--fg);
    font-family: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100%; overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  #viz { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 40%, transparent 45%, rgba(8,6,14,.55) 100%); }

  #stage { position: relative; z-index: 3; display: flex; flex-direction: column;
    align-items: center; width: 100%; }

  /* 导入栏 */
  #importBar { margin-top: 2.4vh; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #songInput {
    background: var(--field); border: 1px solid #34304a; color: var(--fg);
    padding: 9px 14px; border-radius: 10px; font-size: .92rem; width: 320px; outline: none;
  }
  #songInput:focus { border-color: var(--accent2); }
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a172a;
    border: none; padding: 9px 16px; border-radius: 10px; font-weight: 700; font-size: .9rem; cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid #34304a; font-weight: 500; }
  #status { color: var(--muted); font-size: .82rem; min-height: 1.1em; margin-top: 6px; text-align: center; }
  #keyPanel { display: none; margin-top: 8px; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
  #keyPanel.show { display: flex; }
  #keyInput { background: var(--field); border: 1px solid #34304a; color: var(--fg);
    padding: 8px 12px; border-radius: 10px; font-size: .85rem; width: 320px; outline: none; }
  #keyHint { color: var(--muted); font-size: .72rem; max-width: 460px; text-align: center; line-height: 1.5; }

  .song-title { margin-top: 1.6vh; font-size: 1.05rem; color: var(--accent2); letter-spacing: 2px; }
  #chordNow {
    font-size: 4.6rem; font-weight: 800; line-height: 1.1; margin: 1vh 0 1.6vh; min-height: 4.6rem;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; transition: transform .12s ease; }
  #chordNow.hit { transform: scale(1.08); }

  #chart { display: flex; flex-direction: column; gap: 12px; align-items: center; max-width: 92vw;
    max-height: 34vh; overflow-y: auto; padding: 4px; }
  #chart::-webkit-scrollbar { width: 0; }
  .line { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
  .seg { display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: .4; transition: opacity .2s ease, transform .2s ease; }
  .seg .ch { font-size: .82rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .seg .ly { font-size: 1.4rem; color: var(--fg); }
  .seg.active { opacity: 1; transform: scale(1.14); }
  .seg.active .ly { text-shadow: 0 0 22px var(--accent); }

  .strum { margin-top: 2.4vh; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .strum-btn {
    width: 132px; height: 132px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a172a;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    font-weight: 800; font-size: 1.2rem; cursor: pointer;
    box-shadow: 0 0 50px rgba(255,143,171,.4); transition: transform .06s ease; }
  .strum-btn:active { transform: scale(.93); }
  .strum-btn small { font-weight: 500; font-size: .76rem; opacity: .85; }
  .hint { color: var(--muted); font-size: .88rem; text-align: center; line-height: 1.7; }
  .hint b { color: var(--fg); }

  #overlay { position: fixed; inset: 0; background: rgba(10,8,16,.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; cursor: pointer; z-index: 10; backdrop-filter: blur(4px); }
  #overlay h2 { font-size: 1.6rem; font-weight: 700; }
  #overlay p { color: var(--muted); }
  .play { width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(255,143,171,.5); animation: pulse 1.8s ease-in-out infinite; }
  .play::after { content: ""; border-style: solid; border-width: 15px 0 15px 24px;
    border-color: transparent transparent transparent #1a172a; margin-left: 6px; }
  @keyframes pulse { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.06);} }
</style>
</head>
<body>
  <canvas id="viz"></canvas>
  <div id="vignette"></div>

  <div id="overlay">
    <div class="play"></div>
    <h2>边弹边唱</h2>
    <p>点击开始 · 跟着高亮和弦,按 <b>空格</b> 扫弦,开口唱</p>
  </div>

  <div id="stage">
    <div id="importBar">
      <input id="songInput" placeholder="粘贴网易云歌曲链接 / 分享文本(也支持直接打歌名)" />
      <button class="btn" id="genBtn">AI 生成和弦</button>
    </div>
    <div id="status"></div>

    <div class="song-title" id="songTitle">小星星</div>
    <div id="chordNow">·</div>
    <div id="chart"></div>

    <div class="strum">
      <div class="strum-btn" id="strumBtn">扫弦<small>SPACE</small></div>
      <div class="hint">和弦永远是对的 —— <b>每扫一下往前一个和弦,快慢你定</b><br/>跟着歌词,边扫边唱</div>
    </div>
  </div>

<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<script>
/* ===================== 歌曲(默认精校:小星星) ===================== */
let SONG = {
  title: "小星星",
  lines: [
    [ { c: "C", t: "一闪一闪" }, { c: "G", t: "亮晶晶" } ],
    [ { c: "C", t: "满天都是" }, { c: "G", t: "小星星" } ],
    [ { c: "F", t: "挂在天空" }, { c: "C", t: "放光明" } ],
    [ { c: "F", t: "好像许多" }, { c: "C", t: "小眼睛" } ],
    [ { c: "C", t: "一闪一闪" }, { c: "G", t: "亮晶晶" } ],
    [ { c: "C", t: "满天都是" }, { c: "G", t: "小星星" } ],
  ],
};

/* ===================== 通用和弦解析(任意和弦名 → 音) ===================== */
const NOTE_SEMI = { C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11 };
const SEMI_NAME = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function semiToNote(semi, baseOct) {
  const oct = baseOct + Math.floor(semi / 12);
  return SEMI_NAME[((semi % 12) + 12) % 12] + oct;
}
function chordToNotes(symbol) {
  const m = String(symbol).match(/^([A-G][#b]?)(.*)$/);
  if (!m || NOTE_SEMI[m[1]] == null) return ["C3", "E3", "G3", "C4"];
  const r = NOTE_SEMI[m[1]];
  const q = m[2].toLowerCase();
  let ints;
  if (q.startsWith("maj7") || q.startsWith("major7")) ints = [0,4,7,11];
  else if (q.startsWith("m7") || q.startsWith("min7")) ints = [0,3,7,10];
  else if (q.startsWith("dim")) ints = [0,3,6];
  else if (q.startsWith("aug")) ints = [0,4,8];
  else if (q.startsWith("sus2")) ints = [0,2,7];
  else if (q.startsWith("sus")) ints = [0,5,7];
  else if (q.startsWith("6")) ints = [0,4,7,9];
  else if (q.startsWith("7")) ints = [0,4,7,10];
  else if (q.startsWith("m") || q.startsWith("min")) ints = [0,3,7];
  else ints = [0,4,7];
  const notes = ints.map((iv) => semiToNote(r + iv, 3));
  notes.push(semiToNote(r + 12, 3)); // 顶音补根,扫弦更饱满
  return notes;
}
function chordRoot(symbol) {
  const m = String(symbol).match(/^([A-G][#b]?)/);
  return (m && NOTE_SEMI[m[1]] != null) ? SEMI_NAME[NOTE_SEMI[m[1]]] + "2" : "C2";
}

/* ===================== 播放状态 ===================== */
let started = false, activeSlot = -1, strumUp = false;
let strumSynth, bass;
let BARS = [], segEls = [], prevSeg = null;

const chartEl = document.getElementById("chart");
const chordNowEl = document.getElementById("chordNow");
const songTitleEl = document.getElementById("songTitle");

function showSlot(i) {
  if (prevSeg) prevSeg.classList.remove("active");
  const el = segEls[i];
  if (el) { el.classList.add("active"); prevSeg = el; el.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
  if (BARS[i]) chordNowEl.textContent = BARS[i].c;
}

// 载入一首歌:支持精校格式([{c,t}])和 AI 格式({segments:[{chord,lyric}]})
function loadSong(song) {
  SONG = song;
  songTitleEl.textContent = song.title || "未命名";
  chartEl.innerHTML = "";
  BARS = []; segEls = []; prevSeg = null; activeSlot = -1;
  for (const line of song.lines) {
    const segs = line.segments || line;
    const lineEl = document.createElement("div");
    lineEl.className = "line";
    for (const seg of segs) {
      const c = seg.c != null ? seg.c : seg.chord;
      const t = seg.t != null ? seg.t : seg.lyric;
      const idx = BARS.length;
      BARS.push({ c, t });
      const el = document.createElement("div");
      el.className = "seg";
      el.innerHTML = `<span class="ch">${c}</span><span class="ly">${t}</span>`;
      segEls[idx] = el;
      lineEl.appendChild(el);
    }
    chartEl.appendChild(lineEl);
  }
  chordNowEl.textContent = "·";
  if (segEls[0]) { segEls[0].classList.add("active"); prevSeg = segEls[0]; }
  if (BARS[0]) chordNowEl.textContent = BARS[0].c;
}
loadSong(SONG);

/* ===================== 视觉(极光 + 扫弦荡开的辉光) ===================== */
const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");
let W, H, dpr;
function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

const orbs = [], rings = [];
let pulse = 0;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function noteColor(midi) {
  const t = clamp((midi - 40) / (84 - 40), 0, 1);
  return { h: 196 + t * 128, s: 88, l: 70 };
}
const blobs = [
  { hx: 0.26, hy: 0.32, r: 0.62, hue: 268, sx: 0.00017, sy: 0.00011, ax: 0.10, ay: 0.07, ph: 0 },
  { hx: 0.72, hy: 0.28, r: 0.66, hue: 202, sx: 0.00013, sy: 0.00019, ax: 0.09, ay: 0.06, ph: 2 },
  { hx: 0.50, hy: 0.74, r: 0.60, hue: 322, sx: 0.00021, sy: 0.00009, ax: 0.08, ay: 0.05, ph: 4 },
];
function spawnNote(x, y, midi, vel) {
  const c = noteColor(midi);
  rings.push({ x, y, r: 10, grow: 2.2 + vel * 1.6, life: 70, maxLife: 70, c });
  const n = 4 + Math.floor(vel * 5);
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * 6.283, sp = 0.4 + Math.random() * 1.4;
    const life = 70 + Math.random() * 55;
    orbs.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 0.4,
      size: 12 + Math.random() * 20 * vel, c, life, maxLife: life });
  }
}
function render(ts) {
  const maxD = Math.max(W, H);
  ctx.clearRect(0, 0, W, H);
  ctx.globalCompositeOperation = "lighter";
  const glow = 0.06 + pulse * 0.05;
  for (const b of blobs) {
    const bx = (b.hx + b.ax * Math.sin(ts * b.sx + b.ph)) * W;
    const by = (b.hy + b.ay * Math.cos(ts * b.sy + b.ph)) * H;
    const rad = b.r * maxD * (1 + pulse * 0.06);
    const g = ctx.createRadialGradient(bx, by, 0, bx, by, rad);
    g.addColorStop(0, `hsla(${b.hue},78%,56%,${glow})`);
    g.addColorStop(1, `hsla(${b.hue},78%,56%,0)`);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  pulse *= 0.90;
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.r += r.grow; r.life -= 1;
    const a = clamp(r.life / r.maxLife, 0, 1);
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 7);
    ctx.strokeStyle = `hsla(${r.c.h},${r.c.s}%,${r.c.l}%,${a * 0.55})`;
    ctx.lineWidth = 2 + a * 2;
    ctx.shadowBlur = 22; ctx.shadowColor = `hsl(${r.c.h} ${r.c.s}% ${r.c.l}%)`;
    ctx.stroke(); ctx.shadowBlur = 0;
    if (r.life <= 0) rings.splice(i, 1);
  }
  for (let i = orbs.length - 1; i >= 0; i--) {
    const p = orbs[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.vy *= 0.99; p.life -= 1;
    const a = clamp(p.life / p.maxLife, 0, 1);
    const rad = p.size * (1.5 - a * 0.5);
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad);
    g.addColorStop(0, `hsla(${p.c.h},${p.c.s}%,${p.c.l}%,${a * 0.75})`);
    g.addColorStop(0.4, `hsla(${p.c.h},${p.c.s}%,${p.c.l}%,${a * 0.22})`);
    g.addColorStop(1, `hsla(${p.c.h},${p.c.s}%,${p.c.l}%,0)`);
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, 7); ctx.fill();
    if (p.life <= 0) orbs.splice(i, 1);
  }
  ctx.globalCompositeOperation = "source-over";
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ===================== 音频引擎 ===================== */
async function start() {
  if (started) return;
  started = true;
  document.getElementById("overlay").style.display = "none";
  await Tone.start();
  strumSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "triangle" },
    envelope: { attack: 0.004, decay: 1.1, sustain: 0.06, release: 0.9 },
    volume: -8,
  }).toDestination();
  bass = new Tone.Synth({ oscillator: { type: "sine" },
    envelope: { attack: 0.02, decay: 0.3, sustain: 0.6, release: 0.5 }, volume: -12 }).toDestination();
}

/* ===================== 扫弦(用户驱动:扫一下前进一格) ===================== */
function strum() {
  if (!strumSynth) return;
  activeSlot = (activeSlot + 1) % BARS.length;
  const bar = BARS[activeSlot];
  const notes = chordToNotes(bar.c);
  const seq = strumUp ? [...notes].reverse() : notes;
  strumUp = !strumUp;
  const t = Tone.now();
  seq.forEach((n, i) => strumSynth.triggerAttackRelease(n, "2n", t + i * 0.03, 0.6 + Math.random() * 0.25));
  bass.triggerAttackRelease(chordRoot(bar.c), "2n", t, 0.7);
  showSlot(activeSlot);
  spawnNote(W / 2, H * 0.4, Tone.Frequency(notes[0]).toMidi(), 0.95);
  pulse = Math.min(1.3, pulse + 0.6);
  chordNowEl.classList.add("hit");
  setTimeout(() => chordNowEl.classList.remove("hit"), 110);
}

/* ===================== AI 导入(调本地后端 → DeepSeek) ===================== */
const statusEl = document.getElementById("status");
const songInput = document.getElementById("songInput");
const setStatus = (s) => { statusEl.textContent = s; };

async function importSong(name) {
  if (!name) { setStatus("先粘贴网易云链接或歌名"); return; }
  setStatus("正在识别歌曲 → 生成和弦…");
  try {
    const res = await fetch("/api/chords", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ song: name }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    if (!data.lines || !data.lines.length) throw new Error("没拿到和弦");
    loadSong(data);
    setStatus(`已载入《${data.title || name}》,按空格弹唱`);
  } catch (e) {
    setStatus("生成失败:" + e.message);
  }
}
document.getElementById("genBtn").addEventListener("click", () => importSong(songInput.value.trim()));
songInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.stopPropagation(); importSong(songInput.value.trim()); } });

/* ===================== 输入(扫弦) ===================== */
document.addEventListener("keydown", (e) => {
  if (e.target === songInput) return; // 输入框里不触发扫弦
  if (!started) { start(); return; }
  if (e.repeat) return;
  if (e.code === "Space" || e.key === " " || /^[a-zA-Z]$/.test(e.key)) { e.preventDefault(); strum(); }
});
const strumBtn = document.getElementById("strumBtn");
strumBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); if (!started) { start(); return; } strum(); });
document.getElementById("overlay").addEventListener("click", start);
</script>
</body>
</html>
